<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Campus Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to see what's new on campus.</p>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 08012345678">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button onclick="login()" class="btn-primary">Login to Market</button>

            <p class="auth-footer">
                New here? <a href="register.html">Create an account</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
