<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell an Item | Campus Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
    <a href="index.html" style="text-decoration: none; color: #64748b; font-size: 0.9rem;">← Back to Market</a>
    <h2 style="margin-top: 15px;">Post New Item</h2>
    
    <div class="input-group">
        <label for="itemImage">Item Photo</label>
        <input type="file" id="itemImage" accept="image/*" required>
    </div>

    <div class="input-group">
        <label>Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Calculus Textbook" required>
    </div>

    <div class="input-group">
        <label>Price (₦)</label>
        <input type="number" id="itemPrice" placeholder="e.g. 5000" required>
    </div>

    <div class="input-group">
        <label>Description</label>
        <textarea id="itemDesc" rows="4" placeholder="Condition, location, etc."></textarea>
    </div>

    <button onclick="postItem()" class="btn-primary">List Item Now</button>
</div>
    <script src="app.js"></script>
    <script>
        // Security: Don't let unlogged users even see this form
        if (!localStorage.getItem('user')) window.location = "login.html";
    </script>
</body>
</html>
